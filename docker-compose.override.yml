services:
  postgres:
    ports: ["5432:5432"]

  redis:
    ports: ["6379:6379"]

  opa:
    ports: ["8181:8181"]

  api:
    build:
      target: development
    volumes:
      - .:/app
    working_dir: /app/services/api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DEBUG: "true"
